<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>収支管理簿</title>
  <style>
    :root {
      --bg: #f4f6f5;
      --panel: #ffffff;
      --line: #d8e2dc;
      --text: #1f2933;
      --muted: #667085;
      --income: #0f766e;
      --expense: #b42318;
      --accent: #2f855a;
      --accent-dark: #276749;
      --shadow: 0 8px 24px rgba(16, 24, 40, .08);
      --top-height: 120px;
      --bottom-height: 132px;
      --fixed-bottom-height: 86px;
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
      padding-top: calc(var(--top-height) + 22px);
      padding-bottom: calc(var(--bottom-height) + 104px);
    }

    body.fixed-screen {
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      padding-bottom: calc(var(--fixed-bottom-height) + 104px);
    }

    button,
    input,
    textarea { font: inherit; }

    .top-balance {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      min-height: var(--top-height);
      z-index: 20;
      background: linear-gradient(135deg, #e7f6ed, #ffffff);
      border-bottom: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 14px 18px;
    }

    body.fixed-screen .top-balance {
      background: linear-gradient(135deg, #eff6ff, #ffffff);
    }

    .top-inner,
    .bottom-inner,
    .main {
      width: min(720px, 100%);
      margin: 0 auto;
    }

    .header-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .screen-badge {
      display: block;
      color: var(--accent-dark);
      font-size: 26px;
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: -.04em;
      white-space: nowrap;
      text-shadow: 0 8px 22px rgba(47, 133, 90, .16);
    }

    .screen-badge::after {
      content: "Household Book";
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      opacity: .72;
    }

    body.fixed-screen .screen-badge {
      color: var(--accent-dark);
      text-shadow: 0 8px 22px rgba(37, 99, 235, .16);
    }

    body.fixed-screen .screen-badge::after {
      content: "Fixed Cost Ledger";
    }

    .label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .02em;
    }

    .balance-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 6px;
    }

    .balance-amount {
      font-size: 32px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: -.03em;
      font-variant-numeric: tabular-nums;
    }

    .editable-balance {
      width: 100%;
      border: 1px solid rgba(47, 133, 90, .30);
      background: rgba(255, 255, 255, .86);
      color: var(--text);
      border-radius: 18px;
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .72), 0 4px 12px rgba(47, 133, 90, .10);
      cursor: pointer;
      text-align: left;
    }

    .editable-balance::after {
      content: "タップして編集";
      flex: 0 0 auto;
      border-radius: 999px;
      background: #e7f6ed;
      color: var(--accent-dark);
      padding: 5px 8px;
      font-size: 12px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
    }

    .editable-balance:active {
      background: #f2f7f4;
    }

    body.fixed-screen .editable-balance {
      border-color: rgba(37, 99, 235, .30);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .72), 0 4px 12px rgba(37, 99, 235, .10);
    }

    body.fixed-screen .editable-balance::after {
      background: #dbeafe;
      color: var(--accent-dark);
    }

    .data-management {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .ghost-button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--accent-dark);
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .subtle-button {
      border-color: rgba(216, 226, 220, .9);
      background: rgba(255, 255, 255, .72);
      color: var(--muted);
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    .switch-button {
      border-color: rgba(47, 133, 90, .45);
      background: #e7f6ed;
      color: var(--accent-dark);
      box-shadow: 0 4px 12px rgba(47, 133, 90, .12);
    }

    body.fixed-screen .switch-button {
      border-color: rgba(37, 99, 235, .42);
      background: #dbeafe;
      box-shadow: 0 4px 12px rgba(37, 99, 235, .12);
    }

    .main {
      padding: 0 12px;
      overflow: hidden;
    }

    .screen-slider {
      display: flex;
      width: 200%;
      transform: translateX(0);
      transition: transform .34s cubic-bezier(.22, .80, .28, 1);
      will-change: transform;
    }

    body.fixed-screen .screen-slider {
      transform: translateX(-50%);
    }

    .screen {
      flex: 0 0 50%;
      min-width: 50%;
    }

    .screen.hidden { display: block; }

    .screen-title {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin: 0 0 12px;
    }

    .screen-title h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
    }

    .screen-title span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .list {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .row {
      width: 100%;
      border: 0;
      background: #fff;
      border-bottom: 1px solid var(--line);
      display: grid;
      grid-template-columns: 54px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 14px 14px;
      text-align: left;
      cursor: pointer;
    }

    .row:last-child { border-bottom: 0; }
    .row:active { background: #f2f7f4; }

    .transaction-row {
      grid-template-columns: 1fr auto;
      gap: 0;
      padding: 0;
      cursor: default;
    }

    .transaction-edit-button {
      min-width: 0;
      border: 0;
      background: transparent;
      display: grid;
      grid-template-columns: 54px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 14px;
      text-align: left;
      cursor: pointer;
    }

    .transaction-delete-button {
      align-self: center;
      margin-right: 12px;
    }

    .transaction-edit-button:active {
      background: rgba(255, 255, 255, .38);
    }

    .date {
      color: var(--muted);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .name {
      min-width: 0;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .category {
      color: var(--muted);
      font-weight: 600;
    }

    .amount {
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .amount.income,
    .money-positive { color: var(--income) !important; }

    .amount.expense,
    .money-negative { color: var(--expense) !important; }

    .money-zero { color: var(--text) !important; }

    .empty,
    .empty-mini {
      background: #fff;
      border: 1px dashed #b7c7bd;
      border-radius: var(--radius);
      color: var(--muted);
      padding: 32px 16px;
      text-align: center;
      font-weight: 700;
    }

    .empty-mini {
      padding: 18px 14px;
      font-weight: 800;
    }

    .floating-add {
      position: fixed;
      right: max(16px, calc((100vw - 720px) / 2 + 16px));
      bottom: calc(var(--bottom-height) + 34px);
      z-index: 18;
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      padding: 14px 18px;
      font-weight: 800;
      box-shadow: 0 12px 24px rgba(47, 133, 90, .32);
      cursor: pointer;
    }

    body.fixed-screen .bottom-summary { display: none; }

    body.fixed-screen .floating-add {
      bottom: 22px;
      background: var(--accent);
      box-shadow: 0 12px 24px rgba(37, 99, 235, .26);
    }

    .bottom-summary,
    .fixed-bottom-summary {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 20;
      background: #ffffff;
      border-top: 1px solid var(--line);
      box-shadow: 0 -8px 24px rgba(16, 24, 40, .08);
      padding: 12px 18px 16px;
    }

    .bottom-summary {
      min-height: var(--bottom-height);
    }

    .fixed-bottom-summary {
      display: none;
      min-height: var(--fixed-bottom-height);
    }

    body.fixed-screen .fixed-bottom-summary {
      display: block;
    }

    .summary-grid { display: grid; gap: 6px; }

    .summary-line {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      font-weight: 800;
    }

    .summary-line span:first-child {
      color: var(--muted);
      font-size: 14px;
    }

    .summary-line span:last-child {
      font-size: 20px;
      font-variant-numeric: tabular-nums;
    }

    .summary-line.total {
      border-top: 1px solid var(--line);
      padding-top: 8px;
      margin-top: 4px;
    }

    .summary-line.total span:last-child { font-size: 26px; }

    body.fixed-screen .fixed-bottom-summary .summary-line.total span:first-child {
      color: var(--accent-dark);
      font-weight: 900;
    }

    body.fixed-screen .fixed-bottom-summary .summary-line.total span:last-child {
      color: var(--accent-dark);
      font-size: 28px;
      font-weight: 900;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(15, 23, 42, .42);
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 16px;
    }

    .modal-backdrop.open { display: flex; }
    .modal-backdrop.center { align-items: center; }

    .modal {
      width: min(560px, 100%);
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 24px 64px rgba(15, 23, 42, .24);
      padding: 18px;
      max-height: 86vh;
      overflow: auto;
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 900;
    }

    .field {
      display: grid;
      gap: 7px;
      margin: 14px 0;
    }

    .field label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 1px solid #cfd8d3;
      border-radius: 14px;
      padding: 13px 14px;
      outline: none;
      background: #fff;
    }

    .field textarea {
      min-height: 120px;
      resize: vertical;
      word-break: break-all;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      line-height: 1.5;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(47, 133, 90, .12);
    }

    .choice-grid {
      display: grid;
      gap: 10px;
      margin: 14px 0;
    }

    .choice-button {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 16px;
      padding: 16px 14px;
      text-align: left;
      cursor: pointer;
      font-weight: 900;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .choice-button:active { background: #f2f7f4; }

    .choice-button.choice-income {
      background: #ecfdf3;
      border-color: #abefc6;
      color: var(--income);
    }

    .choice-button.choice-expense {
      background: #fef3f2;
      border-color: #fecdca;
      color: var(--expense);
    }

    .choice-button.choice-income .choice-sub,
    .choice-button.choice-expense .choice-sub {
      color: inherit;
      opacity: .72;
    }

    .choice-button.choice-income:active { background: #dff8eb; }
    .choice-button.choice-expense:active { background: #fee4e2; }


    .type-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .type-option {
      border: 1px solid rgba(255, 255, 255, .62);
      border-radius: 16px;
      background: rgba(255, 255, 255, .58);
      color: var(--muted);
      padding: 14px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .70), 0 8px 24px rgba(16, 24, 40, .06);
      backdrop-filter: blur(14px) saturate(1.2);
      -webkit-backdrop-filter: blur(14px) saturate(1.2);
      transition: background .16s ease, border-color .16s ease, color .16s ease, transform .12s ease, box-shadow .16s ease;
    }

    .type-option:active {
      transform: translateY(1px);
    }

    .type-option.selected-income {
      background: linear-gradient(135deg, rgba(236, 253, 243, .94), rgba(255, 255, 255, .72));
      border-color: rgba(15, 118, 110, .38);
      color: var(--income);
      box-shadow: 0 14px 30px rgba(15, 118, 110, .14), inset 0 1px 0 rgba(255, 255, 255, .82);
    }

    .type-option.selected-expense {
      background: linear-gradient(135deg, rgba(254, 243, 242, .96), rgba(255, 255, 255, .72));
      border-color: rgba(180, 35, 24, .34);
      color: var(--expense);
      box-shadow: 0 14px 30px rgba(180, 35, 24, .12), inset 0 1px 0 rgba(255, 255, 255, .82);
    }

    .fixed-quick-area[hidden] {
      display: none;
    }

    .choice-sub {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .primary-button,
    .secondary-button,
    .danger-button {
      flex: 1;
      border: 0;
      border-radius: 14px;
      padding: 13px 14px;
      font-weight: 900;
      cursor: pointer;
    }

    .primary-button { background: var(--accent); color: #fff; }
    .secondary-button { background: #eef2f0; color: var(--text); }
    .danger-button { background: #fee4e2; color: var(--expense); }

    .confirm-box,
    .fixed-total-card,
    .fixed-form-card {
      background: #f8faf9;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .confirm-row,
    .fixed-total-line,
    .fixed-category-line {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      font-weight: 800;
    }

    .confirm-row span:first-child,
    .fixed-total-line span:first-child,
    .fixed-category-line span:first-child { color: var(--muted); }

    .confirm-row strong,
    .fixed-total-line strong,
    .fixed-category-line strong {
      text-align: right;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
      margin: 8px 0 0;
    }

    .section-title {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      font-weight: 900;
    }

    .tiny-status {
      color: var(--muted);
      font-size: 12px;
      margin-top: 6px;
      word-break: break-all;
    }

    .fixed-total-card {
      margin: 12px 0;
      gap: 10px;
    }

    .fixed-total-line {
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
    }

    .fixed-total-line strong { font-size: 22px; }

    .fixed-cost-list {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .fixed-cost-group {
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
      box-shadow: var(--shadow);
    }

    .fixed-cost-group-head {
      background: #f8faf9;
      border-bottom: 1px solid var(--line);
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-weight: 900;
    }

    body.fixed-screen .fixed-cost-group-head {
      background: #f8fbff;
    }

    .fixed-cost-head-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .fixed-cost-head-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .fixed-cost-group-head small {
      color: var(--muted);
      font-weight: 700;
      margin-left: 6px;
    }

    .fixed-cost-group-head strong:last-child {
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .fixed-cost-item {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 8px;
      align-items: center;
      padding: 11px 14px;
      border-bottom: 1px solid var(--line);
    }

    .fixed-cost-item:last-child { border-bottom: 0; }

    .fixed-cost-name {
      min-width: 0;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .fixed-cost-amount {
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .mini-button,
    .mini-danger-button {
      border: 0;
      border-radius: 999px;
      padding: 6px 9px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    .mini-button { background: #eef2f0; color: var(--text); }
    .mini-danger-button { background: #fee4e2; color: var(--expense); }



    /* Liquid Glass UI */
    :root {
      --glass: rgba(255, 255, 255, .58);
      --glass-strong: rgba(255, 255, 255, .76);
      --glass-soft: rgba(255, 255, 255, .42);
      --glass-line: rgba(255, 255, 255, .52);
      --glass-shadow: 0 18px 48px rgba(16, 24, 40, .14);
    }

    body {
      background:
        radial-gradient(circle at 18% 0%, rgba(47, 133, 90, .22), transparent 34%),
        radial-gradient(circle at 88% 12%, rgba(125, 211, 252, .24), transparent 32%),
        radial-gradient(circle at 52% 100%, rgba(187, 247, 208, .32), transparent 38%),
        linear-gradient(135deg, #f7fbf8 0%, #eef7f4 48%, #f8fbff 100%);
      background-attachment: fixed;
    }

    body.fixed-screen {
      --top-height: 94px;
      background:
        radial-gradient(circle at 18% 0%, rgba(37, 99, 235, .22), transparent 34%),
        radial-gradient(circle at 88% 12%, rgba(147, 197, 253, .30), transparent 32%),
        radial-gradient(circle at 52% 100%, rgba(219, 234, 254, .42), transparent 38%),
        linear-gradient(135deg, #f8fbff 0%, #eef6ff 52%, #f7fbff 100%);
      background-attachment: fixed;
      padding-top: calc(var(--top-height) + 18px);
    }

    .top-balance,
    .bottom-summary,
    .fixed-bottom-summary,
    .modal,
    .list,
    .fixed-cost-group,
    .fixed-total-card,
    .confirm-box,
    .fixed-form-card,
    .empty,
    .empty-mini {
      background: var(--glass-strong);
      border-color: var(--glass-line);
      box-shadow: var(--glass-shadow);
      backdrop-filter: blur(22px) saturate(1.35);
      -webkit-backdrop-filter: blur(22px) saturate(1.35);
    }

    .top-balance {
      background: linear-gradient(135deg, rgba(231, 246, 237, .72), rgba(255, 255, 255, .52));
      box-shadow: 0 14px 44px rgba(16, 24, 40, .12);
    }

    body.fixed-screen .top-balance {
      background: linear-gradient(135deg, rgba(219, 234, 254, .74), rgba(255, 255, 255, .50));
    }

    body.fixed-screen .balance-area {
      display: none;
    }

    body.fixed-screen .header-topbar {
      margin-bottom: 0;
    }

    body.fixed-screen .top-inner {
      min-height: 56px;
      display: flex;
      align-items: center;
    }

    body.fixed-screen .header-topbar {
      width: 100%;
    }

    .row,
    .choice-button,
    .field input,
    .field select,
    .field textarea,
    .ghost-button,
    .secondary-button,
    .primary-button,
    .danger-button,
    .mini-button,
    .mini-danger-button,
    .editable-balance {
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .70), 0 8px 24px rgba(16, 24, 40, .06);
    }

    .row,
    .choice-button,
    .field input,
    .field select,
    .field textarea {
      background: rgba(255, 255, 255, .62);
      border-color: rgba(255, 255, 255, .58);
      backdrop-filter: blur(14px) saturate(1.2);
      -webkit-backdrop-filter: blur(14px) saturate(1.2);
    }

    .row:active,
    .choice-button:active,
    .editable-balance:active {
      transform: translateY(1px);
      background: rgba(255, 255, 255, .76);
    }

      screenSlider: document.getElementById("screenSlider"),
      mainScreen: document.getElementById("mainScreen"),
      fixedCostScreen: document.getElementById("fixedCostScreen"),
      fixedCostContent: document.getElementById("fixedCostContent"),
      transactionList: document.getElementById("transactionList"),
      clearTransactionsButton: document.getElementById("clearTransactionsButton"),
      addButton: document.getElementById("addButton"),
      incomeTotal: document.getElementById("incomeTotal"),
      expenseTotal: document.getElementById("expenseTotal"),
      finalBalance: document.getElementById("finalBalance"),
      fixedCostTotalFooter: document.getElementById("fixedCostTotalFooter"),
      modalBackdrop: document.getElementById("modalBackdrop"),
      modalTitle: document.getElementById("modalTitle"),
      modalBody: document.getElementById("modalBody"),
      toast: document.getElementById("toast")
    };

    elements.addButton.addEventListener("click", () => {
      if (state.screen === "fixed") openFixedCostAddModal();
      else startAddFlow();
    });
    elements.clearTransactionsButton.addEventListener("click", clearTransactions);
    elements.transactionList.addEventListener("click", handleTransactionListClick);
    elements.currentBalance.addEventListener("click", openBalanceEditor);
    elements.screenSwitchButton.addEventListener("click", toggleScreen);
    elements.dataButton.addEventListener("click", openDataModal);
    elements.modalBackdrop.addEventListener("click", (event) => {
      if (event.target === elements.modalBackdrop) closeModal();
    });
    document.addEventListener("keydown", handleDocumentKeydown);

    render();

    function loadData() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return structuredClone(defaultData);

      try {
        return normalizeData(JSON.parse(raw));
      } catch {
        return structuredClone(defaultData);
      }
    }

    function normalizeData(input) {
      if (!input || !Array.isArray(input.transactions)) throw new Error("invalid transactions");
      if (typeof input.currentBalance !== "number") throw new Error("invalid balance");

      const fixedCostSource = Array.isArray(input.fixedCosts) ? input.fixedCosts : defaultFixedCosts;
      const fixedCosts = fixedCostSource.map(item => ({
        id: item.id || crypto.randomUUID(),
        category: String(item.category || "").trim(),
        name: String(item.name || "").trim(),
        amount: Math.trunc(Number(item.amount))
      })).filter(item =>
        item.category &&
        item.name &&
        Number.isFinite(item.amount) &&
        item.amount > 0
      );

      const categorySource = Array.isArray(input.fixedCategories)
        ? input.fixedCategories
        : fixedCostSource.map(item => item.category);

      const fixedCategories = uniqueStrings([
        ...categorySource,
        ...fixedCosts.map(item => item.category)
      ]);

      return {
        currentBalance: Math.trunc(input.currentBalance),
        fixedCategories,
        fixedCosts,
        transactions: input.transactions.map(item => ({
          id: item.id || crypto.randomUUID(),
          date: String(item.date),
          type: item.type,
          name: String(item.name),
          category: item.category ? String(item.category) : "",
          amount: Math.trunc(Number(item.amount))
        })).filter(item =>
          /^\d{4}-\d{2}-\d{2}$/.test(item.date) &&
          (item.type === "income" || item.type === "expense") &&
          item.name &&
          Number.isFinite(item.amount)
        )
      };
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function render() {
      renderHeaderAndSummary();
      renderTransactionList();
      renderFixedCostScreen();
      applyScreenVisibility();
    }

    function renderHeaderAndSummary() {
      const transactions = visibleTransactions();
      const totals = transactionTotals(transactions);
      const finalBalance = data.currentBalance + totals.income + totals.expense;

      elements.currentBalance.textContent = formatYen(data.currentBalance);
      setMoneyText(elements.incomeTotal, totals.income);
      setMoneyText(elements.expenseTotal, totals.expense);
      setMoneyText(elements.finalBalance, finalBalance);
    }

    function renderTransactionList() {
      const transactions = visibleTransactions();

      if (transactions.length === 0) {
        elements.transactionList.className = "empty";
        elements.transactionList.innerHTML = "予定がありません";
        return;
      }

      elements.transactionList.className = "list";
      elements.transactionList.innerHTML = transactions.map(item => {
        const amountClass = item.amount >= 0 ? "income" : "expense";
        return `
          <div class="row transaction-row" data-id="${escapeHtml(item.id)}">
            <div class="transaction-info" aria-label="${escapeHtml(item.name)}">
              <div class="date">${formatMonthDay(item.date)}</div>
              <div class="name">${escapeHtml(item.name)}</div>
              <div class="amount ${amountClass}">${formatSignedYen(item.amount)}</div>
            </div>
            <button class="mini-button transaction-edit-button" type="button" data-edit-transaction-id="${escapeHtml(item.id)}">変更</button>
            <button class="mini-danger-button transaction-delete-button" type="button" data-delete-transaction-id="${escapeHtml(item.id)}">削除</button>
          </div>
        `;
      }).join("");
    }

    async function handleTransactionListClick(event) {
      const deleteButton = event.target.closest("[data-delete-transaction-id]");
      if (deleteButton) {
        await deleteTransaction(deleteButton.dataset.deleteTransactionId);
        return;
      }

      const editButton = event.target.closest("[data-edit-transaction-id]");
      if (editButton) {
        openEditModal(editButton.dataset.editTransactionId);
      }
    }

    function renderFixedCostScreen() {
      const groups = fixedCostGroups();
      const total = fixedCostTotal();
      elements.fixedCostTotalFooter.textContent = formatYen(total);
      const fixedList = groups.map(group => `
        <div class="fixed-cost-group">
          <div class="fixed-cost-group-head">
            <div class="fixed-cost-head-title">${escapeHtml(group.category)}<small>${group.items.length}件</small></div>
            <div class="fixed-cost-head-actions">
              <strong>${formatYen(group.subtotal)}</strong>
              <button class="mini-danger-button" type="button" data-delete-fixed-category="${escapeHtml(group.category)}">カテゴリ削除</button>
            </div>
          </div>
          ${group.items.length ? group.items.map(item => `
            <div class="fixed-cost-item">
              <div class="fixed-cost-name">${escapeHtml(item.name)}</div>
              <div class="fixed-cost-amount">${formatYen(item.amount)}</div>
              <button class="mini-button" type="button" data-edit-fixed-cost-id="${escapeHtml(item.id)}">変更</button>
              <button class="mini-danger-button" type="button" data-delete-fixed-cost-id="${escapeHtml(item.id)}">削除</button>
            </div>
          `).join("") : '<div class="empty-mini">このカテゴリの固定費明細はありません。</div>'}
        </div>
      `).join("");

      elements.fixedCostContent.innerHTML = `
        <div class="fixed-cost-list">
          ${fixedList || '<div class="empty-mini">固定費カテゴリがありません。右下の「＋ 固定費を追加」から登録してください。</div>'}
        </div>
      `;

      elements.fixedCostContent.querySelectorAll("[data-edit-fixed-cost-id]").forEach(button => {
        button.addEventListener("click", () => openFixedCostEditor(button.dataset.editFixedCostId));
      });
      elements.fixedCostContent.querySelectorAll("[data-delete-fixed-cost-id]").forEach(button => {
        button.addEventListener("click", () => deleteFixedCost(button.dataset.deleteFixedCostId));
      });
      elements.fixedCostContent.querySelectorAll("[data-delete-fixed-category]").forEach(button => {
        button.addEventListener("click", () => deleteFixedCategory(button.dataset.deleteFixedCategory));
      });
    }

    function toggleScreen() {
      state.screen = state.screen === "main" ? "fixed" : "main";
      applyScreenVisibility();
    }

    function applyScreenVisibility() {
      const fixed = state.screen === "fixed";
      document.body.classList.toggle("fixed-screen", fixed);
      elements.mainScreen.setAttribute("aria-hidden", String(fixed));
      elements.fixedCostScreen.setAttribute("aria-hidden", String(!fixed));
      elements.screenTitleBadge.textContent = fixed ? "固定費管理簿" : "収支管理簿";
      elements.screenSwitchButton.textContent = fixed ? "収支管理簿へ" : "固定費管理簿へ";
      elements.addButton.textContent = fixed ? "＋ 固定費を追加" : "＋ 予定を追加";
      elements.clearTransactionsButton.hidden = fixed;
    }

    function sortedTransactions(transactions) {
      return [...transactions].sort((a, b) => {
        if (a.date === b.date) return a.name.localeCompare(b.name, "ja");
        return a.date.localeCompare(b.date);
      });
    }

    function visibleTransactions() {
      return sortedTransactions(data.transactions);
    }

    function transactionTotals(transactions) {
      return transactions.reduce((totals, item) => {
        if (item.amount > 0) totals.income += item.amount;
        else if (item.amount < 0) totals.expense += item.amount;
        return totals;
      }, { income: 0, expense: 0 });
    }


    function sortedFixedCategories() {
      return [...data.fixedCategories].sort((a, b) => a.localeCompare(b, "ja"));
    }

    function sortedFixedCosts() {
      return [...data.fixedCosts].sort((a, b) => {
        if (a.category === b.category) return a.name.localeCompare(b.name, "ja");
        return a.category.localeCompare(b.category, "ja");
      });
    }

    function fixedCostGroups({ includeEmpty = true } = {}) {
      const groups = new Map();

      sortedFixedCategories().forEach(category => {
        groups.set(category, { category, subtotal: 0, items: [] });
      });

      sortedFixedCosts().forEach(item => {
        if (!groups.has(item.category)) {
          groups.set(item.category, { category: item.category, subtotal: 0, items: [] });
        }
        const group = groups.get(item.category);
        group.subtotal += item.amount;
        group.items.push(item);
      });

      const values = [...groups.values()].sort((a, b) => a.category.localeCompare(b.category, "ja"));
      return includeEmpty ? values : values.filter(group => group.items.length > 0 && group.subtotal > 0);
    }

    function fixedCostTotal() {
      return data.fixedCosts.reduce((sum, item) => sum + item.amount, 0);
    }

    function setMoneyText(element, value) {
      element.textContent = formatSignedYen(value);
      element.classList.remove("money-positive", "money-negative", "money-zero");
      if (value > 0) element.classList.add("money-positive");
      else if (value < 0) element.classList.add("money-negative");
      else element.classList.add("money-zero");
    }

    function moneyClass(value) {
      if (value > 0) return "money-positive";
      if (value < 0) return "money-negative";
      return "money-zero";
    }

    function amountHtml(value) {
      return `<strong class="${moneyClass(value)}">${formatSignedYen(value)}</strong>`;
    }


    function startAddFlow() {
      openTransactionModal({ mode: "add" });
    }

    function openEditModal(id) {
      const item = data.transactions.find(tx => tx.id === id);
      if (!item) return;
      openTransactionModal({ mode: "edit", item });
    }

    function transactionFormHtml({ mode, item }) {
      const isEdit = mode === "edit";
      const dateValue = isEdit ? item.date : todayAsInputValue();
      const nameValue = isEdit ? item.name : "";
      const amountValue = isEdit ? Math.abs(item.amount) : "";
      const typeValue = isEdit ? item.type : "income";
      const groups = fixedCostGroups({ includeEmpty: false });
      const fixedButtons = groups.map(group => `
        <button class="choice-button" type="button" data-quick-fixed-category="${escapeHtml(group.category)}" data-quick-fixed-amount="${group.subtotal}">
          <span>${escapeHtml(group.category)}</span>
          <span class="choice-sub">${formatYen(group.subtotal)}</span>
        </button>
      `).join("");

      return `
        <div class="field">
          <label for="transactionDateInput">月日</label>
          <input id="transactionDateInput" type="date" value="${escapeHtml(dateValue)}">
        </div>
        <div class="field">
          <label>収入/支出</label>
          <div class="type-toggle" role="group" aria-label="収入または支出を選択">
            <button class="type-option" type="button" data-type-option="income" aria-pressed="${typeValue === "income" ? "true" : "false"}">収入</button>
            <button class="type-option" type="button" data-type-option="expense" aria-pressed="${typeValue === "expense" ? "true" : "false"}">支出</button>
          </div>
        </div>
        <div id="fixedQuickArea" class="choice-grid fixed-quick-area" hidden>
          <p class="hint">固定費カテゴリを選ぶと、名称と合計金額を自動入力します。</p>
          ${fixedButtons || '<div class="empty-mini">固定費カテゴリが未登録です。</div>'}
        </div>
        <div class="field">
          <label for="transactionNameInput">名称</label>
          <input id="transactionNameInput" type="text" value="${escapeHtml(nameValue)}">
        </div>
        <div class="field">
          <label for="transactionAmountInput">金額</label>
          <input id="transactionAmountInput" type="number" inputmode="numeric" min="0" value="${escapeHtml(amountValue)}">
        </div>
        <div class="actions">
          <button class="primary-button" type="button" id="saveButton">保存</button>
          <button class="secondary-button" type="button" id="cancelButton">キャンセル</button>
        </div>
      `;
    }

    function openTransactionModal({ mode, item = null }) {
      const title = mode === "edit" ? "予定を編集" : "予定を追加";
      openModal(title, transactionFormHtml({ mode, item }), "center");

      let selectedType = item ? item.type : "income";
      const quickArea = document.getElementById("fixedQuickArea");
      const nameInput = document.getElementById("transactionNameInput");
      const amountInput = document.getElementById("transactionAmountInput");
      const typeButtons = [...document.querySelectorAll("[data-type-option]")];

      const syncType = () => {
        setTypeToggleState(typeButtons, selectedType);
        quickArea.hidden = selectedType !== "expense";
        setModalTone(selectedType);
      };

      typeButtons.forEach(button => {
        button.addEventListener("click", () => {
          selectedType = button.dataset.typeOption;
          syncType();
        });
      });

      document.querySelectorAll("[data-quick-fixed-category]").forEach(button => {
        button.addEventListener("click", () => {
          selectedType = "expense";
          nameInput.value = button.dataset.quickFixedCategory;
          amountInput.value = button.dataset.quickFixedAmount;
          syncType();
        });
      });

      syncType();

      document.getElementById("saveButton").addEventListener("click", () => {
        const values = readTransactionForm(selectedType);
        if (!values) return;

        if (mode === "edit" && item) {
          item.date = values.date;
          item.type = values.type;
          item.name = values.name;
          item.category = "";
          item.amount = values.amount;
        } else {
          data.transactions.push({
            id: crypto.randomUUID(),
            date: values.date,
            type: values.type,
            name: values.name,
            category: "",
            amount: values.amount
          });
        }

        saveData();
        closeModal();
        state.screen = "main";
        render();
      });

      document.getElementById("cancelButton").addEventListener("click", closeModal);
    }

    function readTransactionForm(selectedType) {
      const date = document.getElementById("transactionDateInput").value;
      const name = document.getElementById("transactionNameInput").value.trim();
      const amount = readPositiveAmount("transactionAmountInput");

      if (!date) {
        showToast("月日を入力してください。");
        return null;
      }
      if (!name) {
        showToast("名称を入力してください。");
        return null;
      }
      if (amount === null) return null;

      return {
        date,
        type: selectedType,
        name,
        amount: selectedType === "income" ? amount : -amount
      };
    }

    function setTypeToggleState(buttons, selectedType) {
      buttons.forEach(button => {
        const selected = button.dataset.typeOption === selectedType;
        button.classList.toggle("selected-income", selected && selectedType === "income");
        button.classList.toggle("selected-expense", selected && selectedType === "expense");
        button.setAttribute("aria-pressed", String(selected));
      });
    }

    function setModalTone(type) {
      elements.modalBackdrop.classList.toggle("tone-income", type === "income");
      elements.modalBackdrop.classList.toggle("tone-expense", type === "expense");
    }

    async function deleteTransaction(id) {
      const item = data.transactions.find(tx => tx.id === id);
      if (!item) return;

      const ok = await showConfirm({
        title: "予定を削除",
        message: `${item.name} ${formatSignedYen(item.amount)} を削除しますか？`,
        danger: true
      });
      if (!ok) return;

      data.transactions = data.transactions.filter(tx => tx.id !== id);
      saveData();
      render();
      showToast("予定を削除しました。");
    }

    async function clearTransactions() {
      if (data.transactions.length === 0) {
        showToast("クリアする予定がありません。");
        return;
      }

      const ok = await showConfirm({
        title: "入力一覧をクリア",
        message: `収支管理簿画面の予定 ${data.transactions.length}件を削除します。
現在の預金残高と固定費管理簿のデータは削除されません。`,
        confirmText: "クリアする",
        danger: true
      });
      if (!ok) return;

      data.transactions = [];
      saveData();
      render();
      showToast("入力一覧をクリアしました。");
    }

    function openBalanceEditor() {
      openModal("現在の預金残高", `
        <div class="field">
          <label for="balanceInput">現在の預金残高</label>
          <input id="balanceInput" type="number" inputmode="numeric" value="${data.currentBalance}">
        </div>
        <div class="actions">
          <button class="secondary-button" type="button" id="cancelButton">キャンセル</button>
          <button class="primary-button" type="button" id="saveButton">保存</button>
        </div>
      `, "center");

      document.getElementById("cancelButton").addEventListener("click", closeModal);
      document.getElementById("saveButton").addEventListener("click", () => {
        const value = Number(document.getElementById("balanceInput").value);
        if (!Number.isFinite(value)) {
          showToast("残高を入力してください。");
          return;
        }

        data.currentBalance = Math.trunc(value);
        saveData();
        closeModal();
        render();
      });
    }

    function openFixedCostAddModal() {
      openModal("固定費を追加", fixedCostFormHtml({
        category: "",
        name: "",
        amount: ""
      }), "center");
      bindFixedCategoryChips();

      document.getElementById("saveButton").addEventListener("click", () => {
        const values = readFixedCostForm();
        if (!values) return;

        ensureFixedCategory(values.category);
        data.fixedCosts.push({
          id: crypto.randomUUID(),
          category: values.category,
          name: values.name,
          amount: values.amount
        });
        saveData();
        closeModal();
        render();
      });
      document.getElementById("cancelButton").addEventListener("click", closeModal);
    }

    function fixedCostFormHtml(values) {
      const categoryButtons = sortedFixedCategories()
        .map(category => `
          <button class="category-chip" type="button" data-fill-fixed-category="${escapeHtml(category)}">${escapeHtml(category)}</button>
        `)
        .join("");

      return `
        <div class="field">
          <label for="fixedCategoryInput">カテゴリ</label>
          <input id="fixedCategoryInput" type="text" value="${escapeHtml(values.category)}">
          ${categoryButtons ? `
            <div class="category-chip-area" aria-label="既存カテゴリ">
              <div class="category-chip-title">既存カテゴリ</div>
              <div class="category-chip-list">${categoryButtons}</div>
            </div>
          ` : ""}
        </div>
        <div class="field">
          <label for="fixedNameInput">名称</label>
          <input id="fixedNameInput" type="text" value="${escapeHtml(values.name)}">
        </div>
        <div class="field">
          <label for="fixedAmountInput">金額</label>
          <input id="fixedAmountInput" type="number" inputmode="numeric" min="0" value="${escapeHtml(values.amount)}">
        </div>
        <div class="actions">
          <button class="primary-button" type="button" id="saveButton">保存</button>
          <button class="secondary-button" type="button" id="cancelButton">キャンセル</button>
        </div>
      `;
    }

    function bindFixedCategoryChips() {
      const categoryInput = document.getElementById("fixedCategoryInput");
      if (!categoryInput) return;

      document.querySelectorAll("[data-fill-fixed-category]").forEach(button => {
        button.addEventListener("click", () => {
          categoryInput.value = button.dataset.fillFixedCategory;
          if (document.activeElement instanceof HTMLElement) {
            document.activeElement.blur();
          }
          button.focus({ preventScroll: true });
        });
      });
    }

    function readFixedCostForm() {
      const category = document.getElementById("fixedCategoryInput").value.trim();
      const name = document.getElementById("fixedNameInput").value.trim();
      const amount = readPositiveAmount("fixedAmountInput");

      if (!category) {
        showToast("カテゴリを入力してください。");
        return null;
      }
      if (!name) {
        showToast("名称を入力してください。");
        return null;
      }
      if (amount === null) return null;

      return { category, name, amount };
    }

    function openFixedCostEditor(id) {
      const item = data.fixedCosts.find(cost => cost.id === id);
      if (!item) return;

      openModal("固定費を変更", fixedCostFormHtml({
        category: item.category,
        name: item.name,
        amount: String(item.amount)
      }), "center");
      bindFixedCategoryChips();

      document.getElementById("saveButton").addEventListener("click", () => {
        const values = readFixedCostForm();
        if (!values) return;

        ensureFixedCategory(values.category);
        item.category = values.category;
        item.name = values.name;
        item.amount = values.amount;
        saveData();
        closeModal();
        render();
      });
      document.getElementById("cancelButton").addEventListener("click", closeModal);
    }

    async function deleteFixedCost(id) {
      const item = data.fixedCosts.find(cost => cost.id === id);
      if (!item) return;

      const ok = await showConfirm({
        title: "固定費明細を削除",
        message: `${item.category} / ${item.name} ${formatYen(item.amount)} を削除しますか？

※カテゴリ自体は残ります。`,
        danger: true
      });
      if (!ok) return;

      data.fixedCosts = data.fixedCosts.filter(cost => cost.id !== id);
      saveData();
      render();
    }

    async function deleteFixedCategory(category) {
      const count = data.fixedCosts.filter(cost => cost.category === category).length;
      const message = count > 0
        ? `${category} カテゴリを削除しますか？

配下の固定費 ${count}件も一緒に削除されます。`
        : `${category} カテゴリを削除しますか？`;

      const ok = await showConfirm({
        title: "カテゴリを削除",
        message,
        danger: true
      });
      if (!ok) return;

      data.fixedCategories = data.fixedCategories.filter(item => item !== category);
      data.fixedCosts = data.fixedCosts.filter(cost => cost.category !== category);
      saveData();
      render();
    }

    function ensureFixedCategory(category) {
      if (!data.fixedCategories.includes(category)) {
        data.fixedCategories.push(category);
      }
    }

    function uniqueStrings(values) {
      return [...new Set(values.map(value => String(value || "").trim()).filter(Boolean))];
    }

    function openDataModal() {
      openModal("データバックアップ・復元", `
        <p class="hint backup-lead">バックアップ文字列をコピーして保管します。<br>復元時は保存した文字列を貼り付けます。</p>

        <div class="backup-panel">
          <div class="backup-panel-head">
            <strong>バックアップ</strong>
            <span>予定・残高・固定費</span>
          </div>
          <button class="primary-button backup-wide-button" type="button" id="copyBackupButton">バックアップをコピー</button>
          <div id="backupStatus" class="tiny-status"></div>
        </div>

        <div class="backup-panel">
          <div class="backup-panel-head">
            <strong>復元</strong>
            <span>現在のデータを上書き</span>
          </div>
          <div class="field compact-field">
            <label for="importText">バックアップ文字列</label>
            <p class="hint restore-field-hint">保存しておいたバックアップ文字列を貼り付けてください。読み込むと現在のデータは上書きされます。</p>
            <textarea id="importText" class="compact-textarea"></textarea>
          </div>
          <div class="actions compact-actions">
            <button class="secondary-button" type="button" id="pasteBackupButton">貼り付け</button>
            <button class="danger-button" type="button" id="importButton">読み込む</button>
          </div>
        </div>

        <div class="actions compact-actions">
          <button class="secondary-button" type="button" id="cancelButton">キャンセル</button>
        </div>
      `);

      document.getElementById("copyBackupButton").addEventListener("click", async () => {
        const status = document.getElementById("backupStatus");
        status.textContent = "バックアップ作成中...";
        const text = await encodeExportString(data);
        const copied = await copyText(text);
        if (copied) {
          status.textContent = `コピーしました。${text.length}文字`;
          showToast("バックアップをコピーしました。");
          return;
        }
        status.innerHTML = `
          <div class="copy-fallback-box">
            <div>自動コピーできませんでした。下の文字列を手動でコピーしてください。</div>
            <textarea readonly>${escapeHtml(text)}</textarea>
          </div>
        `;
        const textarea = status.querySelector("textarea");
        textarea.focus();
        textarea.select();
      });

      document.getElementById("pasteBackupButton").addEventListener("click", async () => {
        const textarea = document.getElementById("importText");

        try {
          const text = await navigator.clipboard.readText();
          textarea.value = text.trim();
        } catch {
          showToast("クリップボードを読み取れませんでした。手動で貼り付けてください。");
          textarea.focus();
        }
      });

      document.getElementById("importButton").addEventListener("click", async () => {
        const raw = document.getElementById("importText").value.trim();
        if (!raw) {
          showToast("バックアップ文字列を貼り付けてください。");
          return;
        }

        let imported;
        try {
          imported = await decodeExportString(raw);
        } catch (error) {
          showToast("読み込みに失敗しました。バックアップ文字列が壊れている可能性があります。");
          return;
        }

        const message =
          `今のデータを、バックアップの内容で上書きしますか？\n\n` +
          `現在：予定 ${data.transactions.length}件 / 固定費 ${data.fixedCosts.length}件 / カテゴリ ${data.fixedCategories.length}件 / 残高 ${formatYen(data.currentBalance)}\n` +
          `バックアップ：予定 ${imported.transactions.length}件 / 固定費 ${imported.fixedCosts.length}件 / カテゴリ ${imported.fixedCategories.length}件 / 残高 ${formatYen(imported.currentBalance)}`;

        const ok = await showConfirm({
          title: "バックアップから読み込み",
          message,
          danger: true,
          confirmText: "読み込む"
        });
        if (!ok) return;

        data = imported;
        saveData();
        closeModal();
        render();
      });

      document.getElementById("cancelButton").addEventListener("click", closeModal);
    }

    async function encodeExportString(sourceData) {
      const packed = packData(sourceData);
      const json = JSON.stringify(packed);

      if ("CompressionStream" in window) {
        try {
          const compressed = await compressText(json);
          return EXPORT_PREFIX_COMPRESSED + bytesToBase64Url(compressed);
        } catch {
          return EXPORT_PREFIX_PLAIN + bytesToBase64Url(new TextEncoder().encode(json));
        }
      }

      return EXPORT_PREFIX_PLAIN + bytesToBase64Url(new TextEncoder().encode(json));
    }

    async function decodeExportString(text) {
      if (text.startsWith(EXPORT_PREFIX_COMPRESSED)) {
        const bytes = base64UrlToBytes(text.slice(EXPORT_PREFIX_COMPRESSED.length));
        const json = await decompressText(bytes);
        return unpackData(JSON.parse(json));
      }

      if (text.startsWith(EXPORT_PREFIX_PLAIN)) {
        const bytes = base64UrlToBytes(text.slice(EXPORT_PREFIX_PLAIN.length));
        const json = new TextDecoder().decode(bytes);
        return unpackData(JSON.parse(json));
      }

      throw new Error("unknown format");
    }

    function packData(sourceData) {
      const transactions = sortedTransactions(sourceData.transactions).map(item => [
        item.date.replaceAll("-", ""),
        item.type === "income" ? 1 : 0,
        item.name,
        item.category || "",
        item.amount
      ]);

      const fixedCosts = [...sourceData.fixedCosts]
        .sort((a, b) => {
          if (a.category === b.category) return a.name.localeCompare(b.name, "ja");
          return a.category.localeCompare(b.category, "ja");
        })
        .map(item => [item.category, item.name, item.amount]);

      const fixedCategories = uniqueStrings(sourceData.fixedCategories || fixedCosts.map(item => item[0]));

      return [sourceData.currentBalance, transactions, fixedCosts, fixedCategories];
    }

    function unpackData(packed) {
      if (!Array.isArray(packed) || packed.length < 2 || !Array.isArray(packed[1])) {
        throw new Error("invalid packed data");
      }

      const transactions = packed[1].map(item => {
        if (!Array.isArray(item) || item.length < 5) throw new Error("invalid transaction");

        const dateText = String(item[0]);
        const date = `${dateText.slice(0, 4)}-${dateText.slice(4, 6)}-${dateText.slice(6, 8)}`;
        const type = item[1] === 1 ? "income" : "expense";
        const amount = Math.trunc(Number(item[4]));

        return {
          id: crypto.randomUUID(),
          date,
          type,
          name: String(item[2]),
          category: String(item[3] || ""),
          amount
        };
      });

      const fixedCosts = Array.isArray(packed[2]) ? packed[2].map(item => {
        if (!Array.isArray(item) || item.length < 3) throw new Error("invalid fixed cost");
        return {
          id: crypto.randomUUID(),
          category: String(item[0] || ""),
          name: String(item[1] || ""),
          amount: Math.trunc(Number(item[2]))
        };
      }) : structuredClone(defaultFixedCosts);

      const fixedCategories = Array.isArray(packed[3])
        ? packed[3].map(item => String(item || ""))
        : fixedCosts.map(item => item.category);

      return normalizeData({
        currentBalance: Math.trunc(Number(packed[0])),
        fixedCategories,
        fixedCosts,
        transactions
      });
    }

    async function compressText(text) {
      const stream = new Blob([text]).stream().pipeThrough(new CompressionStream("deflate"));
      const buffer = await new Response(stream).arrayBuffer();
      return new Uint8Array(buffer);
    }

    async function decompressText(bytes) {
      const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream("deflate"));
      const buffer = await new Response(stream).arrayBuffer();
      return new TextDecoder().decode(buffer);
    }

    function bytesToBase64Url(bytes) {
      let binary = "";
      for (const byte of bytes) binary += String.fromCharCode(byte);

      return btoa(binary)
        .replaceAll("+", "-")
        .replaceAll("/", "_")
        .replaceAll("=", "");
    }

    function base64UrlToBytes(text) {
      const base64 = text.replaceAll("-", "+").replaceAll("_", "/")
        + "=".repeat((4 - text.length % 4) % 4);
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);

      for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    async function copyText(text) {
      if (!navigator.clipboard || !window.isSecureContext) return false;

      try {
        await navigator.clipboard.writeText(text);
        return true;
      } catch {
        return false;
      }
    }

    function openModal(title, bodyHtml, placement = "center") {
      state.previousFocus = document.activeElement instanceof HTMLElement ? document.activeElement : null;
      elements.modalTitle.textContent = title;
      elements.modalBody.innerHTML = bodyHtml;
      elements.modalBackdrop.classList.remove("center", "tone-income", "tone-expense");
      if (placement === "center") elements.modalBackdrop.classList.add("center");
      elements.modalBackdrop.classList.add("open");

      requestAnimationFrame(() => {
        const focusTarget = firstFocusableElement(elements.modalBackdrop) || elements.modalBackdrop;
        focusTarget.focus();
      });
    }

    function closeModal({ restoreFocus = true } = {}) {
      elements.modalBackdrop.classList.remove("open", "center", "tone-income", "tone-expense");
      elements.modalBody.innerHTML = "";

      if (restoreFocus && state.previousFocus && document.contains(state.previousFocus)) {
        state.previousFocus.focus();
      }
      state.previousFocus = null;
    }

    function handleDocumentKeydown(event) {
      if (!elements.modalBackdrop.classList.contains("open")) return;

      if (event.key === "Escape") {
        event.preventDefault();
        closeModal();
        return;
      }

      if (event.key === "Tab") {
        trapModalFocus(event);
      }
    }

    function firstFocusableElement(root) {
      return root.querySelector(focusableSelector());
    }

    function focusableSelector() {
      return [
        "button:not([disabled])",
        "input:not([disabled])",
        "select:not([disabled])",
        "textarea:not([disabled])",
        "a[href]",
        "[tabindex]:not([tabindex='-1'])"
      ].join(",");
    }

    function trapModalFocus(event) {
      const focusable = [...elements.modalBackdrop.querySelectorAll(focusableSelector())]
        .filter(element => element.offsetParent !== null || element === document.activeElement);
      if (!focusable.length) {
        event.preventDefault();
        elements.modalBackdrop.focus();
        return;
      }

      const first = focusable[0];
      const last = focusable[focusable.length - 1];

      if (event.shiftKey && document.activeElement === first) {
        event.preventDefault();
        last.focus();
      } else if (!event.shiftKey && document.activeElement === last) {
        event.preventDefault();
        first.focus();
      }
    }

    function showConfirm({ title, message, confirmText = "削除", cancelText = "キャンセル", danger = false }) {
      return new Promise(resolve => {
        openModal(title, `
          <div class="confirm-box">
            ${String(message).split("\n").map(line => `<p class="hint">${escapeHtml(line) || "&nbsp;"}</p>`).join("")}
          </div>
          <div class="actions">
            <button class="${danger ? "danger-button" : "primary-button"}" type="button" id="confirmOkButton">${escapeHtml(confirmText)}</button>
            <button class="secondary-button" type="button" id="confirmCancelButton">${escapeHtml(cancelText)}</button>
          </div>
        `, "center");

        document.getElementById("confirmOkButton").addEventListener("click", () => {
          closeModal({ restoreFocus: false });
          resolve(true);
        });
        document.getElementById("confirmCancelButton").addEventListener("click", () => {
          closeModal();
          resolve(false);
        });
      });
    }

    function showToast(message) {
      clearTimeout(state.toastTimer);
      elements.toast.textContent = message;
      elements.toast.classList.add("open");
      state.toastTimer = setTimeout(() => {
        elements.toast.classList.remove("open");
      }, 2600);
    }

    function readPositiveAmount(inputId) {
      const value = Number(document.getElementById(inputId).value);
      if (!Number.isFinite(value) || value <= 0) {
        showToast("金額を入力してください。");
        return null;
      }
      return Math.trunc(value);
    }

    function formatYen(value) {
      return new Intl.NumberFormat("ja-JP", {
        style: "currency",
        currency: "JPY",
        maximumFractionDigits: 0
      }).format(value);
    }

    function formatSignedYen(value) {
      const sign = value > 0 ? "+" : value < 0 ? "-" : "";
      return `${sign}${formatYen(Math.abs(value))}`;
    }

    function formatMonthDay(dateText) {
      const [, month, day] = dateText.split("-").map(Number);
      return `${month}/${day}`;
    }


    function todayAsInputValue() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
