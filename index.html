<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>収支管理簿</title>
  <style>
    html, body { touch-action: manipulation; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    :root {
      --bg-main: #f1f3ff;
      --bg-fixed: #f4f5f7;
      --panel: rgba(255, 255, 255, .94);
      --panel-strong: rgba(255, 255, 255, .98);
      --line: rgba(71, 85, 105, .40);
      --text: #172033;
      --muted: #536074;
      --income: #0f766e;
      --expense: #b42318;
      --accent: #4f46e5;
      --accent-dark: #3730a3;
      --fixed-accent: #64748b;
      --fixed-accent-dark: #334155;
      --focus-border: #475569;
      --focus-ring: rgba(71, 85, 105, .18);
      --radius: 22px;
      --inner-width: min(720px, calc(100vw - 36px));
      --header-h: 164px;
      --footer-h: 132px;
      --header-top-gap: 22px;
      --content-gap: 12px;
      --footer-bottom-gap: 12px;
      --floating-gap: 12px;
      --list-row-font-size: 15px;
      --list-row-line-height: 1.25;
      --list-row-height: 44px;
      --list-row-left: 12px;
      --list-row-right: 10px;
    }

    * { box-sizing: border-box; }

    html { min-height: 100%; }

    body {
      margin: 0;
      min-height: 100%;
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 12% 8%, rgba(79, 70, 229, .16), transparent 34%),
        linear-gradient(135deg, var(--bg-main), #f8fbff);
      padding-top: calc(var(--header-h) + var(--content-gap));
      padding-bottom: 0;
      height: 100dvh;
      overflow: hidden;
      overflow-x: hidden;
      transition: background .28s ease;
    }

    body.fixed-screen {
      background:
        radial-gradient(circle at 14% 8%, rgba(100, 116, 139, .18), transparent 34%),
        linear-gradient(135deg, var(--bg-fixed), #f8fbff);
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    .top-balance {
      position: fixed;
      inset: 0 0 auto;
      z-index: 20;
      border-bottom: 1px solid rgba(255, 255, 255, .45);
      background: rgba(241, 243, 255, .82);
      backdrop-filter: blur(18px) saturate(1.35);
      -webkit-backdrop-filter: blur(18px) saturate(1.35);
      padding: calc(var(--header-top-gap) + env(safe-area-inset-top)) 0 16px;
    }

    body.fixed-screen .top-balance {
      background: rgba(244, 245, 247, .82);
    }

    .top-inner,
    .bottom-inner,
    .main {
      width: var(--inner-width);
      margin: 0 auto;
    }

    .header-topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .screen-title {
      margin: 0;
      color: var(--accent-dark);
      font-size: clamp(27px, 5.8vw, 34px);
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: -.03em;
    }

    body.fixed-screen .screen-title {
      color: var(--fixed-accent-dark);
    }

    .data-button {
      flex: 0 0 auto;
      border: 1px solid rgba(100, 116, 139, .30);
      border-radius: 999px;
      background: rgba(255, 255, 255, .90);
      color: var(--muted);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .56);
      padding: 9px 13px;
      font-size: 14px;
      line-height: 1.1;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    .balance-area {
      margin-top: 14px;
    }

    body.fixed-screen .balance-area {
      display: none;
    }

    .label {
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .editable-balance {
      width: 100%;
      min-height: 58px;
      border: 1px solid rgba(79, 70, 229, .28);
      border-radius: 20px;
      background: rgba(255, 255, 255, .62);
      color: var(--text);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .70);
      padding: 10px 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      text-align: left;
      cursor: pointer;
      font-size: clamp(30px, 7.6vw, 42px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: -.04em;
      font-variant-numeric: tabular-nums;
    }

    .editable-balance::after {
      content: "タップして編集";
      flex: 0 0 auto;
      color: var(--accent-dark);
      background: rgba(238, 242, 255, .86);
      border: 1px solid rgba(79, 70, 229, .22);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
    }

    .main {
      overflow: hidden;
      height: max(120px, calc(100dvh - var(--header-h) - var(--content-gap) - var(--footer-h) - 86px));
    }

    .screen-slider {
      display: flex;
      width: 200%;
      height: 100%;
      transform: translateX(0);
      transition: transform .32s cubic-bezier(.22, .80, .28, 1);
      will-change: transform;
    }

    body.fixed-screen .screen-slider {
      transform: translateX(-50%);
    }

    .screen {
      flex: 0 0 50%;
      width: 50%;
      min-width: 0;
      height: 100%;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 0 0 2px;
      scrollbar-width: none;
    }

    .screen::-webkit-scrollbar {
      display: none;
    }

    .screen.screen-hidden {
      visibility: hidden;
      pointer-events: none;
    }

    .list,
    .empty,
    .fixed-cost-list {
      width: 100%;
    }

    .list,
    .fixed-cost-group,
    .empty,
    .empty-mini,
    .modal,
    .bottom-summary,
    .fixed-bottom-summary {
      border: 1px solid rgba(71, 85, 105, .30);
      background: var(--panel);
      backdrop-filter: blur(18px) saturate(1.32);
      -webkit-backdrop-filter: blur(18px) saturate(1.32);
      box-shadow: none;
    }

    .list,
    .fixed-cost-group,
    .empty {
      border-radius: var(--radius);
      overflow: hidden;
    }

    .row,
    .fixed-cost-item {
      border-bottom: 1px solid rgba(71, 85, 105, .24);
      background: transparent;
    }

    .row:last-child,
    .fixed-cost-item:last-child {
      border-bottom: 0;
    }

    .transaction-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 8px;
      align-items: center;
      min-height: var(--list-row-height);
      padding: 0 var(--list-row-right) 0 0;
    }

    .transaction-info {
      min-width: 0;
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr) auto;
      gap: 3px;
      align-items: center;
      min-height: var(--list-row-height);
      padding: 0 4px 0 var(--list-row-left);
    }

    .date {
      color: var(--muted);
      font-size: var(--list-row-font-size);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: var(--list-row-line-height);
      white-space: nowrap;
    }

    .name {
      min-width: 0;
      color: var(--text);
      font-size: var(--list-row-font-size);
      font-weight: 700;
      line-height: var(--list-row-line-height);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .amount,
    .fixed-cost-amount {
      font-size: var(--list-row-font-size);
      font-weight: 700;
      line-height: var(--list-row-line-height);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .amount.income,
    .money-positive { color: var(--income) !important; }
    .amount.expense,
    .money-negative { color: var(--expense) !important; }
    .money-zero { color: var(--text) !important; }

    .mini-button,
    .mini-danger-button {
      border: 1px solid rgba(100, 116, 139, .22);
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 13px;
      line-height: 1;
      font-weight: 900;
      cursor: pointer;
      white-space: nowrap;
    }

    .mini-button {
      background: rgba(248, 250, 252, .92);
      color: var(--text);
    }

    .mini-danger-button {
      background: rgba(254, 226, 226, .92);
      border-color: rgba(180, 35, 24, .20);
      color: var(--expense);
    }

    .fixed-cost-list {
      display: grid;
      gap: 10px;
    }

    .fixed-cost-group {
      border-radius: 22px;
      overflow: hidden;
    }

    .fixed-cost-group-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 11px 14px;
      background: rgba(226, 232, 240, .96);
      border-bottom: 1px solid rgba(100, 116, 139, .28);
    }

    .fixed-cost-head-title {
      min-width: 0;
      display: flex;
      align-items: baseline;
      gap: 4px;
      color: var(--fixed-accent-dark);
      font-weight: 900;
      font-size: 15px;
      overflow: hidden;
      white-space: nowrap;
    }

    .fixed-cost-head-title span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .fixed-cost-head-title small {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .fixed-cost-head-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      white-space: nowrap;
    }

    .fixed-cost-head-actions strong {
      min-width: 92px;
      text-align: right;
      font-size: 15px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .fixed-cost-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto auto;
      gap: 8px;
      align-items: center;
      min-height: var(--list-row-height);
      height: var(--list-row-height);
      padding: 0 var(--list-row-right) 0 var(--list-row-left);
    }

    .fixed-cost-name {
      min-width: 0;
      color: var(--text);
      font-size: var(--list-row-font-size);
      font-weight: 700;
      line-height: var(--list-row-line-height);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .fixed-cost-amount {
      min-width: 82px;
      text-align: right;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .empty,
    .empty-mini {
      color: var(--muted);
      font-weight: 900;
      text-align: center;
      line-height: 1.45;
    }

    .empty {
      padding: 30px 16px;
    }

    .empty-mini {
      border-radius: 18px;
      padding: 18px 12px;
    }

    .floating-actions {
      position: fixed;
      left: max(18px, calc((100vw - 720px) / 2 + 18px));
      right: max(18px, calc((100vw - 720px) / 2 + 18px));
      bottom: calc(var(--footer-h) + 22px);
      z-index: 18;
      display: flex;
      align-items: center;
      gap: var(--floating-gap);
      pointer-events: none;
    }

    .floating-spacer {
      flex: 1 1 auto;
      min-width: 8px;
    }

    .floating-nav,
    .floating-clear,
    .floating-add {
      min-width: 0;
      min-height: 52px;
      border-radius: 999px;
      padding: 0 18px;
      border: 1px solid rgba(255, 255, 255, .56);
      font-size: 15px;
      line-height: 1;
      font-weight: 900;
      white-space: nowrap;
      cursor: pointer;
      box-shadow: none;
      pointer-events: auto;
    }

    .floating-nav {
      flex: 0 1 auto;
      color: var(--accent-dark);
      background: rgba(255, 255, 255, .90);
      border-color: rgba(39, 103, 73, .30);
    }

    body.fixed-screen .floating-nav {
      color: var(--fixed-accent-dark);
      border-color: rgba(100, 116, 139, .32);
    }

    .floating-clear {
      flex: 0 0 auto;
      color: var(--expense);
      background: rgba(255, 255, 255, .74);
      border-color: rgba(180, 35, 24, .22);
    }

    .floating-add {
      flex: 0 0 auto;
      color: #fff;
      background: var(--accent);
      border-color: rgba(255, 255, 255, .36);
    }

    body.fixed-screen .floating-add {
      background: var(--fixed-accent);
    }

    body.fixed-screen .floating-clear {
      display: none;
    }

    .bottom-summary,
    .fixed-bottom-summary {
      position: fixed;
      inset: auto 0 0;
      z-index: 20;
      border-width: 1px 0 0;
      border-radius: 0;
      background: rgba(255, 255, 255, .90);
      padding: 10px 0 calc(var(--footer-bottom-gap) + env(safe-area-inset-bottom));
    }

    body.fixed-screen .bottom-summary,
    body:not(.fixed-screen) .fixed-bottom-summary {
      display: none;
    }

    .summary-grid {
      display: grid;
      gap: 4px;
    }

    .summary-line {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      font-weight: 900;
      line-height: 1.12;
    }

    .summary-line span:first-child {
      color: var(--muted);
      font-size: 12px;
    }

    .summary-line span:last-child {
      font-size: 17px;
      font-variant-numeric: tabular-nums;
    }

    .summary-line.total {
      border-top: 1px solid rgba(148, 163, 184, .28);
      margin-top: 3px;
      padding-top: 7px;
    }

    .summary-line.total span:last-child {
      font-size: clamp(25px, 6.2vw, 30px);
      font-weight: 900;
      letter-spacing: -.04em;
    }

    .fixed-bottom-summary .summary-line.total {
      border-top: 0;
      margin-top: 0;
      padding-top: 0;
    }

    .fixed-bottom-summary .summary-line.total span:first-child {
      color: var(--muted);
      font-size: 14px;
    }

    .fixed-bottom-summary .summary-line.total span:last-child {
      color: var(--fixed-accent-dark);
      font-size: clamp(25px, 6.2vw, 30px);
      font-weight: 900;
      letter-spacing: -.04em;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: rgba(15, 23, 42, .34);
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: min(560px, 100%);
      max-height: min(86vh, 720px);
      overflow: auto;
      border-radius: 24px;
      padding: 18px;
      background: rgba(255, 255, 255, .88);
    }

    .modal-backdrop.tone-income .modal {
      background: linear-gradient(135deg, rgba(220, 252, 231, .98), rgba(255, 255, 255, .94));
    }

    .modal-backdrop.tone-expense .modal {
      background: linear-gradient(135deg, rgba(254, 226, 226, .98), rgba(255, 255, 255, .94));
    }

    .modal-head {
      margin-bottom: 14px;
    }

    .modal-title {
      margin: 0;
      color: var(--text);
      font-size: 22px;
      line-height: 1.2;
      font-weight: 900;
      letter-spacing: -.03em;
    }

    .field {
      display: grid;
      gap: 7px;
      margin: 13px 0;
    }

    .field label,
    .section-title,
    .chip-title {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
      font-weight: 900;
    }

    .field input,
    .field textarea {
      width: 100%;
      min-width: 0;
      border: 1px solid rgba(100, 116, 139, .36);
      border-radius: 16px;
      outline: none;
      background: rgba(255, 255, 255, .94);
      color: var(--text);
      padding: 12px 13px;
    }

    .field input {
      min-height: 48px;
      line-height: 1.25;
    }

    .field input[type="date"] {
      height: 50px;
      min-height: 50px;
      padding-block: 0;
      line-height: normal;
      text-align: center;
      -webkit-appearance: none;
      appearance: none;
    }

    .field input[type="date"]::-webkit-date-and-time-value {
      min-height: 1.25em;
      line-height: 1.25;
      text-align: center;
    }

    .field input[type="date"]::-webkit-calendar-picker-indicator {
      margin: 0;
    }

    .field textarea {
      min-height: 112px;
      resize: vertical;
      word-break: break-all;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      line-height: 1.45;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: var(--focus-border);
      box-shadow: 0 0 0 4px var(--focus-ring);
    }

    .type-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .type-option,
    .category-chip {
      cursor: pointer;
      border: 1px solid rgba(100, 116, 139, .26);
      background: rgba(255, 255, 255, .90);
    }

    .type-option {
      min-height: 52px;
      border-radius: 17px;
      color: var(--muted);
      font-weight: 900;
    }

    .type-option.selected-income {
      background: rgba(15, 118, 110, .24);
      border-color: rgba(15, 118, 110, .52);
      color: var(--income);
    }

    .type-option.selected-expense {
      background: rgba(180, 35, 24, .22);
      border-color: rgba(180, 35, 24, .48);
      color: var(--expense);
    }


    .fixed-quick-area {
      border: 1px solid rgba(180, 35, 24, .18);
      border-radius: 18px;
      background: rgba(255, 255, 255, .54);
      padding: 10px;
    }

    .hint,
    .confirm-lead,
    .confirm-message,
    .tiny-status {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.38;
      font-weight: 800;
      margin: 0;
    }

    .tiny-status.status-success {
      color: #334155;
      font-weight: 900;
    }

    .section-title {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(148, 163, 184, .22);
      color: var(--text);
      font-size: 15px;
      letter-spacing: .01em;
    }

    .section-title::before {
      content: "";
      display: inline-block;
      width: 4px;
      height: 14px;
      border-radius: 999px;
      background: #64748b;
      margin-right: 7px;
      vertical-align: -2px;
    }

    .category-chip-area {
      display: grid;
      gap: 7px;
      margin-top: 8px;
    }

    .category-chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .category-chip {
      border: 1px solid rgba(217, 119, 6, .32);
      border-radius: 999px;
      background: rgba(254, 243, 199, .82);
      color: #92400e;
      padding: 7px 11px;
      font-size: 12px;
      line-height: 1;
      font-weight: 900;
    }

    .confirm-lead {
      color: var(--text);
      font-weight: 900;
      margin-bottom: 10px;
    }

    .confirm-box {
      border: 1px solid rgba(148, 163, 184, .22);
      border-radius: 18px;
      background: rgba(255, 255, 255, .52);
      padding: 13px;
      margin-top: 6px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .primary-button,
    .secondary-button,
    .danger-button {
      flex: 1;
      min-height: 46px;
      border: 1px solid rgba(100, 116, 139, .22);
      border-radius: 15px;
      padding: 11px 12px;
      font-weight: 900;
      cursor: pointer;
    }

    .primary-button { background: #334155; border-color: rgba(15, 23, 42, .42); color: #fff; }
    body.fixed-screen .primary-button { background: #334155; border-color: rgba(15, 23, 42, .42); }
    .secondary-button { background: rgba(248, 250, 252, .94); color: var(--text); }
    .danger-button { background: rgba(254, 226, 226, .96); border-color: rgba(180, 35, 24, .24); color: var(--expense); }


    .quote-button {
      width: 100%;
      min-height: 48px;
      border: 1px solid rgba(180, 35, 24, .30);
      border-radius: 16px;
      background: var(--expense);
      color: #fff;
      padding: 11px 13px;
      font-weight: 900;
      cursor: pointer;
    }

    .fixed-quote-list {
      display: grid;
      gap: 12px;
    }

    .fixed-quote-group {
      border: 1px solid rgba(100, 116, 139, .24);
      border-radius: 18px;
      background: rgba(255, 255, 255, .58);
      overflow: hidden;
    }

    .fixed-quote-group-head,
    .fixed-quote-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 10px;
      align-items: center;
    }

    .fixed-quote-group-head {
      padding: 12px;
      background: rgba(254, 226, 226, .58);
      border-bottom: 1px solid rgba(180, 35, 24, .16);
    }

    .fixed-quote-title,
    .fixed-quote-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .fixed-quote-title {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }

    .fixed-quote-title > strong {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--expense);
      font-size: 15px;
      line-height: 1.25;
    }

    .fixed-quote-title small {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .fixed-quote-category-amount,
    .fixed-quote-detail-amount {
      min-width: 82px;
      text-align: right;
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .fixed-quote-category-amount {
      font-size: 15px;
    }

    .fixed-quote-item {
      padding: 11px 12px;
      border-top: 1px solid rgba(100, 116, 139, .14);
    }

    .fixed-quote-item:first-of-type {
      border-top: 0;
    }

    .fixed-quote-name {
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
    }


    .quote-category-button,
    .quote-detail-button {
      border: 1px solid rgba(180, 35, 24, .22);
      border-radius: 999px;
      background: rgba(255, 255, 255, .92);
      color: var(--expense);
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1;
      font-weight: 900;
      cursor: pointer;
      white-space: nowrap;
    }

    .backup-output {
      display: none;
    }

    .backup-output.open {
      display: block;
    }

    .backup-output textarea {
      min-height: 78px;
    }

    #backupText,
    #importText {
      font-size: 10px;
      line-height: 1.35;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(var(--footer-h) + 96px);
      z-index: 120;
      transform: translateX(-50%) translateY(12px);
      max-width: min(520px, calc(100vw - 32px));
      border-radius: 999px;
      background: rgba(23, 32, 51, .90);
      color: #fff;
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.35;
      font-weight: 800;
      white-space: pre-line;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
    }

    .toast.open {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 540px) {
      :root {
        --inner-width: calc(100vw - 32px);
        --floating-gap: 8px;
        --list-row-font-size: 14px;
        --list-row-height: 42px;
        --list-row-left: 10px;
        --list-row-right: 8px;
      }

      .screen-title {
        font-size: clamp(26px, 7.2vw, 32px);
      }

      .data-button {
        padding: 8px 11px;
        font-size: 13px;
      }

      .editable-balance {
        min-height: 56px;
        padding: 9px 13px;
      }

      .editable-balance::after {
        padding: 7px 10px;
        font-size: 12px;
      }

      .transaction-row {
        grid-template-columns: minmax(0, 1fr) auto auto;
        gap: 6px;
        min-height: var(--list-row-height);
        padding-right: var(--list-row-right);
      }

      .transaction-info {
        grid-template-columns: 38px minmax(0, 1fr) auto;
        gap: 2px;
        min-height: var(--list-row-height);
        padding: 0 2px 0 var(--list-row-left);
      }

      .date,
      .name,
      .amount,
      .fixed-cost-name,
      .fixed-cost-amount {
        font-size: var(--list-row-font-size);
      }

      .mini-button,
      .mini-danger-button {
        padding: 8px 9px;
        font-size: 12px;
      }

      .fixed-cost-group-head {
        align-items: center;
      }

      .fixed-cost-head-actions {
        flex-direction: row;
        align-items: center;
        gap: 8px;
      }

      .fixed-cost-item {
        grid-template-columns: minmax(0, 1fr) auto auto auto;
        min-height: var(--list-row-height);
        height: var(--list-row-height);
        padding: 0 var(--list-row-right) 0 var(--list-row-left);
      }

      .fixed-cost-head-actions strong,
      .fixed-cost-amount,
      .fixed-quote-category-amount,
      .fixed-quote-detail-amount {
        min-width: 76px;
      }

      .summary-line span:last-child {
        font-size: 16px;
      }

      .summary-line.total span:last-child,
      .fixed-bottom-summary .summary-line.total span:last-child {
        font-size: 27px;
      }

      .floating-actions {
        left: calc(12px + env(safe-area-inset-left));
        right: calc(12px + env(safe-area-inset-right));
        bottom: calc(var(--footer-h) + 20px);
      }

      .floating-nav,
      .floating-clear,
      .floating-add {
        min-height: 50px;
        padding: 0 14px;
        font-size: 14px;
      }
    }

    @media (max-width: 380px) {
      :root {
        --inner-width: calc(100vw - 28px);
        --floating-gap: 7px;
      }

      .screen-title {
        font-size: 25px;
      }

      .data-button {
        padding: 7px 9px;
        font-size: 12.5px;
      }

      .floating-actions {
        left: calc(10px + env(safe-area-inset-left));
        right: calc(10px + env(safe-area-inset-right));
      }

      .floating-nav,
      .floating-clear,
      .floating-add {
        padding: 0 11px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <header class="top-balance">
    <div class="top-inner">
      <div class="header-topbar">
        <h1 id="screenTitle" class="screen-title">収支管理簿</h1>
        <button id="dataButton" class="data-button" type="button">データバックアップ・復元</button>
      </div>
      <div id="balanceArea" class="balance-area">
        <div class="label">現在の預金残高</div>
        <button id="currentBalance" class="editable-balance" type="button" aria-label="現在の預金残高を編集">¥0</button>
      </div>
    </div>
  </header>

  <main class="main">
    <div id="screenSlider" class="screen-slider">
      <section id="mainScreen" class="screen" aria-label="収支管理簿">
        <div id="transactionList" class="list"></div>
      </section>
      <section id="fixedCostScreen" class="screen screen-hidden" aria-label="固定費管理簿">
        <div id="fixedCostContent"></div>
      </section>
    </div>
  </main>

  <div class="floating-actions" aria-label="画面操作">
    <button id="screenSwitchButton" class="floating-nav" type="button">固定費管理簿へ</button>
    <div class="floating-spacer" aria-hidden="true"></div>
    <button id="clearTransactionsButton" class="floating-clear" type="button">入力クリア</button>
    <button id="addButton" class="floating-add" type="button">＋ 予定追加</button>
  </div>

  <footer class="bottom-summary" aria-label="収支集計">
    <div class="bottom-inner summary-grid">
      <div class="summary-line">
        <span>収入合計</span>
        <span id="incomeTotal">¥0</span>
      </div>
      <div class="summary-line">
        <span>支出合計</span>
        <span id="expenseTotal">¥0</span>
      </div>
      <div class="summary-line total">
        <span>収支（預金残高含む）</span>
        <span id="finalBalance">¥0</span>
      </div>
    </div>
  </footer>

  <footer class="fixed-bottom-summary" aria-label="固定費総合計">
    <div class="bottom-inner summary-grid">
      <div class="summary-line total">
        <span>固定費総合計</span>
        <span id="fixedCostTotalFooter">¥0</span>
      </div>
    </div>
  </footer>

  <div id="modalBackdrop" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle" tabindex="-1">
    <div class="modal">
      <div class="modal-head">
        <h2 id="modalTitle" class="modal-title">入力</h2>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    const STORAGE_KEY = "simple-household-book-main-v1";
    const EXPORT_PREFIX_COMPRESSED = "S2.";
    const EXPORT_PREFIX_PLAIN = "S2P.";
    const YEN_FORMATTER = new Intl.NumberFormat("ja-JP", {
      style: "currency",
      currency: "JPY",
      maximumFractionDigits: 0
    });
    const INTEGER_FORMATTER = new Intl.NumberFormat("ja-JP", { maximumFractionDigits: 0 });

    const defaultFixedCosts = [
      { id: newId(), category: "クレジット", name: "スマホ代", amount: 7764 },
      { id: newId(), category: "クレジット", name: "NISA", amount: 10000 },
      { id: newId(), category: "クレジット", name: "生活費(B43)", amount: 34000 },
      { id: newId(), category: "口座振替", name: "家賃", amount: 55650 },
      { id: newId(), category: "口座振替", name: "車ローン", amount: 25000 },
      { id: newId(), category: "口座振替", name: "学資保険", amount: 5661 }
    ];

    const defaultData = {
      currentBalance: 0,
      fixedCategories: ["クレジット", "口座振替"],
      fixedCosts: clone(defaultFixedCosts),
      transactions: []
    };

    let data = loadData();

    const state = {
      screen: "main",
      previousFocus: null,
      toastTimer: null,
      screenVisibilityTimer: null,
      layoutObserver: null
    };

    const elements = {
      topBalance: document.querySelector(".top-balance"),
      bottomSummary: document.querySelector(".bottom-summary"),
      fixedBottomSummary: document.querySelector(".fixed-bottom-summary"),
      screenTitle: document.getElementById("screenTitle"),
      dataButton: document.getElementById("dataButton"),
      currentBalance: document.getElementById("currentBalance"),
      mainScreen: document.getElementById("mainScreen"),
      fixedCostScreen: document.getElementById("fixedCostScreen"),
      transactionList: document.getElementById("transactionList"),
      fixedCostContent: document.getElementById("fixedCostContent"),
      screenSwitchButton: document.getElementById("screenSwitchButton"),
      clearTransactionsButton: document.getElementById("clearTransactionsButton"),
      addButton: document.getElementById("addButton"),
      incomeTotal: document.getElementById("incomeTotal"),
      expenseTotal: document.getElementById("expenseTotal"),
      finalBalance: document.getElementById("finalBalance"),
      fixedCostTotalFooter: document.getElementById("fixedCostTotalFooter"),
      modalBackdrop: document.getElementById("modalBackdrop"),
      modalTitle: document.getElementById("modalTitle"),
      modalBody: document.getElementById("modalBody"),
      toast: document.getElementById("toast")
    };

    elements.addButton.addEventListener("click", () => {
      if (state.screen === "fixed") openFixedCostModal({ mode: "add" });
      else openTransactionModal({ mode: "add" });
    });
    elements.clearTransactionsButton.addEventListener("click", clearTransactions);
    elements.transactionList.addEventListener("click", handleTransactionListClick);
    elements.currentBalance.addEventListener("click", openBalanceEditor);
    elements.screenSwitchButton.addEventListener("click", toggleScreen);
    elements.dataButton.addEventListener("click", openDataModal);
    elements.modalBackdrop.addEventListener("click", event => {
      if (event.target === elements.modalBackdrop) closeModal();
    });
    document.addEventListener("keydown", handleDocumentKeydown);
    window.addEventListener("resize", syncLayoutInsets);

    setupLayoutObservers();
    render();
    syncLayoutInsets();

    function newId() {
      if (globalThis.crypto?.randomUUID) return crypto.randomUUID();
      return `id-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function clone(value) {
      if (typeof structuredClone === "function") return structuredClone(value);
      return JSON.parse(JSON.stringify(value));
    }

    function setupLayoutObservers() {
      if (!("ResizeObserver" in window)) return;
      const observer = new ResizeObserver(syncLayoutInsets);
      [elements.topBalance, elements.bottomSummary, elements.fixedBottomSummary]
        .filter(Boolean)
        .forEach(element => observer.observe(element));
      state.layoutObserver = observer;
    }

    function syncLayoutInsets() {
      const footer = state.screen === "fixed" ? elements.fixedBottomSummary : elements.bottomSummary;

      if (elements.topBalance) {
        document.documentElement.style.setProperty("--header-h", `${Math.ceil(elements.topBalance.getBoundingClientRect().height)}px`);
      }
      if (footer) {
        document.documentElement.style.setProperty("--footer-h", `${Math.ceil(footer.getBoundingClientRect().height)}px`);
      }
    }

    function loadData() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return clone(defaultData);

      try {
        return normalizeData(JSON.parse(raw));
      } catch {
        return clone(defaultData);
      }
    }

    function normalizeData(input) {
      if (!input || typeof input.currentBalance !== "number" || !Array.isArray(input.transactions)) {
        throw new Error("invalid data");
      }

      const fixedCostSource = Array.isArray(input.fixedCosts) ? input.fixedCosts : defaultFixedCosts;
      const fixedCosts = fixedCostSource.map(item => ({
        id: item.id || newId(),
        category: String(item.category || "").trim(),
        name: String(item.name || "").trim(),
        amount: Math.trunc(Number(item.amount))
      })).filter(item => item.category && item.name && Number.isFinite(item.amount) && item.amount > 0);

      const categorySource = Array.isArray(input.fixedCategories)
        ? input.fixedCategories
        : fixedCostSource.map(item => item.category);

      const fixedCategories = uniqueStrings([
        ...categorySource,
        ...fixedCosts.map(item => item.category)
      ]);

      const transactions = input.transactions.map(item => ({
        id: item.id || newId(),
        date: String(item.date),
        type: item.type,
        name: String(item.name || "").trim(),
        category: String(item.category || "").trim(),
        amount: Math.trunc(Number(item.amount))
      })).filter(item =>
        /^\d{4}-\d{2}-\d{2}$/.test(item.date) &&
        (item.type === "income" || item.type === "expense") &&
        item.name &&
        Number.isFinite(item.amount)
      );

      return {
        currentBalance: Math.trunc(input.currentBalance),
        fixedCategories,
        fixedCosts,
        transactions
      };
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function render() {
      renderHeaderAndSummary();
      renderTransactionList();
      renderFixedCostScreen();
      applyScreenVisibility();
    }

    function renderHeaderAndSummary() {
      const totals = transactionTotals(data.transactions);
      elements.currentBalance.textContent = formatYen(data.currentBalance);
      setMoneyText(elements.incomeTotal, totals.income);
      setMoneyText(elements.expenseTotal, totals.expense);
      setMoneyText(elements.finalBalance, data.currentBalance + totals.income + totals.expense);
      elements.fixedCostTotalFooter.textContent = formatYen(fixedCostTotal());
    }

    function renderTransactionList() {
      const transactions = sortedTransactions(data.transactions);
      if (!transactions.length) {
        elements.transactionList.className = "empty";
        elements.transactionList.innerHTML = "予定がありません。<br>右下の「＋ 予定追加」から登録してください。";
        return;
      }

      elements.transactionList.className = "list";
      elements.transactionList.innerHTML = transactions.map(item => {
        const amountClass = item.amount >= 0 ? "income" : "expense";
        return `
          <div class="row transaction-row" data-id="${escapeHtml(item.id)}">
            <div class="transaction-info" aria-label="${escapeHtml(item.name)}">
              <div class="date">${formatMonthDay(item.date)}</div>
              <div class="name">${escapeHtml(item.name)}</div>
              <div class="amount ${amountClass}">${formatSignedYen(item.amount)}</div>
            </div>
            <button class="mini-button" type="button" data-edit-transaction-id="${escapeHtml(item.id)}">変更</button>
            <button class="mini-danger-button" type="button" data-delete-transaction-id="${escapeHtml(item.id)}">削除</button>
          </div>
        `;
      }).join("");
    }

    function renderFixedCostScreen() {
      const groups = fixedCostGroups({ sortCategoriesBySubtotal: true });
      const listHtml = groups.map(group => `
        <div class="fixed-cost-group">
          <div class="fixed-cost-group-head">
            <div class="fixed-cost-head-title"><span>${escapeHtml(group.category)}</span><small> (${group.items.length}件)</small></div>
            <div class="fixed-cost-head-actions">
              <strong>${formatYen(group.subtotal)}</strong>
              <button class="mini-danger-button" type="button" data-delete-fixed-category="${escapeHtml(group.category)}">カテゴリ削除</button>
            </div>
          </div>
          ${group.items.length ? group.items.map(item => `
            <div class="fixed-cost-item">
              <div class="fixed-cost-name">${escapeHtml(item.name)}</div>
              <div class="fixed-cost-amount">${formatYen(item.amount)}</div>
              <button class="mini-button" type="button" data-edit-fixed-cost-id="${escapeHtml(item.id)}">変更</button>
              <button class="mini-danger-button" type="button" data-delete-fixed-cost-id="${escapeHtml(item.id)}">削除</button>
            </div>
          `).join("") : '<div class="empty-mini">このカテゴリの固定費明細はありません。</div>'}
        </div>
      `).join("");

      elements.fixedCostContent.innerHTML = `
        <div class="fixed-cost-list">
          ${listHtml || '<div class="empty-mini">固定費カテゴリがありません。<br>右下の「＋ 固定費追加」から登録してください。</div>'}
        </div>
      `;
    }

    function handleTransactionListClick(event) {
      const deleteButton = event.target.closest("[data-delete-transaction-id]");
      if (deleteButton) {
        deleteTransaction(deleteButton.dataset.deleteTransactionId);
        return;
      }

      const editButton = event.target.closest("[data-edit-transaction-id]");
      if (editButton) {
        const item = data.transactions.find(tx => tx.id === editButton.dataset.editTransactionId);
        if (item) openTransactionModal({ mode: "edit", item });
      }
    }

    elements.fixedCostContent.addEventListener("click", event => {
      const editButton = event.target.closest("[data-edit-fixed-cost-id]");
      if (editButton) {
        const item = data.fixedCosts.find(cost => cost.id === editButton.dataset.editFixedCostId);
        if (item) openFixedCostModal({ mode: "edit", item });
        return;
      }

      const deleteButton = event.target.closest("[data-delete-fixed-cost-id]");
      if (deleteButton) {
        deleteFixedCost(deleteButton.dataset.deleteFixedCostId);
        return;
      }

      const categoryButton = event.target.closest("[data-delete-fixed-category]");
      if (categoryButton) {
        deleteFixedCategory(categoryButton.dataset.deleteFixedCategory);
      }
    });

    function toggleScreen() {
      state.screen = state.screen === "main" ? "fixed" : "main";
      applyScreenVisibility();
    }

    function applyScreenVisibility() {
      const fixed = state.screen === "fixed";
      const activeScreen = fixed ? elements.fixedCostScreen : elements.mainScreen;
      const inactiveScreen = fixed ? elements.mainScreen : elements.fixedCostScreen;

      clearTimeout(state.screenVisibilityTimer);
      activeScreen.classList.remove("screen-hidden");
      activeScreen.inert = false;
      inactiveScreen.inert = true;

      document.body.classList.toggle("fixed-screen", fixed);
      elements.mainScreen.setAttribute("aria-hidden", String(fixed));
      elements.fixedCostScreen.setAttribute("aria-hidden", String(!fixed));
      elements.screenTitle.textContent = fixed ? "固定費管理簿" : "収支管理簿";
      elements.screenSwitchButton.textContent = fixed ? "収支管理簿へ" : "固定費管理簿へ";
      elements.addButton.textContent = fixed ? "＋ 固定費追加" : "＋ 予定追加";
      elements.clearTransactionsButton.hidden = fixed;

      state.screenVisibilityTimer = setTimeout(() => {
        inactiveScreen.classList.add("screen-hidden");
      }, 360);

      requestAnimationFrame(syncLayoutInsets);
    }

    function sortedTransactions(transactions) {
      return [...transactions].sort((a, b) => {
        if (a.date === b.date) return a.name.localeCompare(b.name, "ja");
        return a.date.localeCompare(b.date);
      });
    }

    function transactionTotals(transactions) {
      return transactions.reduce((totals, item) => {
        if (item.amount > 0) totals.income += item.amount;
        if (item.amount < 0) totals.expense += item.amount;
        return totals;
      }, { income: 0, expense: 0 });
    }

    function sortedFixedCategories() {
      return [...data.fixedCategories].sort((a, b) => a.localeCompare(b, "ja"));
    }

    function sortedFixedCosts() {
      return [...data.fixedCosts].sort((a, b) => {
        if (a.category === b.category) return a.name.localeCompare(b.name, "ja");
        return a.category.localeCompare(b.category, "ja");
      });
    }

    function fixedCostGroups({ includeEmpty = true, sortCategoriesBySubtotal = false } = {}) {
      const groups = new Map();

      data.fixedCategories.forEach(category => {
        groups.set(category, { category, subtotal: 0, items: [] });
      });

      data.fixedCosts.forEach(item => {
        if (!groups.has(item.category)) {
          groups.set(item.category, { category: item.category, subtotal: 0, items: [] });
        }
        const group = groups.get(item.category);
        group.subtotal += item.amount;
        group.items.push(item);
      });

      let values = [...groups.values()];
      values.forEach(group => group.items.sort((a, b) => {
        if (a.amount !== b.amount) return b.amount - a.amount;
        return a.name.localeCompare(b.name, "ja");
      }));

      if (sortCategoriesBySubtotal) {
        values = values
          .map((group, index) => ({ group, index }))
          .sort((a, b) => {
            if (a.group.subtotal !== b.group.subtotal) {
              return b.group.subtotal - a.group.subtotal;
            }
            return a.index - b.index;
          })
          .map(entry => entry.group);
      }

      return includeEmpty ? values : values.filter(group => group.items.length > 0 && group.subtotal > 0);
    }

    function fixedCostTotal() {
      return data.fixedCosts.reduce((sum, item) => sum + item.amount, 0);
    }

    function setMoneyText(element, value) {
      element.textContent = formatSignedYen(value);
      element.classList.remove("money-positive", "money-negative", "money-zero");
      if (value > 0) element.classList.add("money-positive");
      else if (value < 0) element.classList.add("money-negative");
      else element.classList.add("money-zero");
    }

    function openTransactionModal({ mode, item = null, draft = null }) {
      const isEdit = mode === "edit";
      const values = draft || {
        date: isEdit ? item.date : todayAsInputValue(),
        type: isEdit ? item.type : "income",
        name: isEdit ? item.name : "",
        amount: isEdit ? Math.abs(item.amount) : ""
      };

      openModal(isEdit ? "予定変更" : "予定追加", transactionFormHtml(values), "center");
      setupTransactionForm({ mode, item, values });
      setupMoneyInput("transactionAmountInput");
      setupEnterNavigation(["transactionDateInput", "transactionNameInput", "transactionAmountInput"]);

      document.getElementById("cancelButton").addEventListener("click", closeModal);
      document.getElementById("saveButton").addEventListener("click", () => {
        const formValues = readTransactionForm();
        if (!formValues) return;

        if (isEdit) Object.assign(item, formValues);
        else data.transactions.push({ id: newId(), ...formValues });

        saveData();
        closeModal();
        render();
      });
    }

    function transactionFormHtml(values) {
      return `
        <div class="field">
          <label for="transactionDateInput">月日</label>
          <input id="transactionDateInput" type="date" value="${escapeHtml(values.date)}" enterkeyhint="next">
        </div>
        <div class="field">
          <label>収入/支出</label>
          <div class="type-toggle" role="group" aria-label="収入または支出を選択">
            <button class="type-option" type="button" data-type-option="income">収入</button>
            <button class="type-option" type="button" data-type-option="expense">支出</button>
          </div>
        </div>
        <div id="fixedQuickArea" class="fixed-quick-area" hidden>
          <p class="hint">固定費管理簿のデータから、<br>カテゴリ別または個別の明細を引用できます。</p>
          <button id="openFixedQuoteButton" class="quote-button" type="button">固定費から引用</button>
        </div>
        <div class="field">
          <label for="transactionNameInput">名称</label>
          <input id="transactionNameInput" type="text" value="${escapeHtml(values.name)}" enterkeyhint="next">
        </div>
        <div class="field">
          <label for="transactionAmountInput">金額</label>

    async function encodeExportString(sourceData) {
      const packed = packData(sourceData);
      const json = JSON.stringify(packed);

      if ("CompressionStream" in window) {
        try {
          const compressed = await compressText(json);
          return EXPORT_PREFIX_COMPRESSED + bytesToBase64Url(compressed);
        } catch {
          return EXPORT_PREFIX_PLAIN + bytesToBase64Url(new TextEncoder().encode(json));
        }
      }

      return EXPORT_PREFIX_PLAIN + bytesToBase64Url(new TextEncoder().encode(json));
    }

    async function decodeExportString(text) {
      if (text.startsWith(EXPORT_PREFIX_COMPRESSED)) {
        const bytes = base64UrlToBytes(text.slice(EXPORT_PREFIX_COMPRESSED.length));
        const json = await decompressText(bytes);
        return unpackData(JSON.parse(json));
      }

      if (text.startsWith(EXPORT_PREFIX_PLAIN)) {
        const bytes = base64UrlToBytes(text.slice(EXPORT_PREFIX_PLAIN.length));
        const json = new TextDecoder().decode(bytes);
        return unpackData(JSON.parse(json));
      }

      throw new Error("unknown format");
    }

    function packData(sourceData) {
      const dictionary = [];
      const dictionaryMap = new Map();
      const textIndex = value => {
        const text = String(value || "");
        if (dictionaryMap.has(text)) return dictionaryMap.get(text);
        const index = dictionary.length;
        dictionary.push(text);
        dictionaryMap.set(text, index);
        return index;
      };

      const transactions = sortedTransactions(sourceData.transactions).map(item => [
        Number(item.date.replaceAll("-", "")),
        textIndex(item.name),
        item.amount
      ]);

      const fixedCosts = sortedFixedCosts().map(item => [
        textIndex(item.category),
        textIndex(item.name),
        item.amount
      ]);

      const fixedCategories = uniqueStrings(sourceData.fixedCategories || [])
        .map(category => textIndex(category));

      return [sourceData.currentBalance, dictionary, transactions, fixedCosts, fixedCategories];
    }

    function unpackData(packed) {
      if (!Array.isArray(packed) || packed.length !== 5 || !Array.isArray(packed[1]) || !Array.isArray(packed[2])) {
        throw new Error("invalid packed data");
      }

      const dictionary = packed[1].map(value => String(value || ""));
      const readText = index => {
        const text = dictionary[Number(index)];
        if (typeof text !== "string") throw new Error("invalid dictionary reference");
        return text;
      };

      const transactions = packed[2].map(item => {
        if (!Array.isArray(item) || item.length < 3) throw new Error("invalid transaction");
        const dateText = String(item[0]).padStart(8, "0");
        const amount = Math.trunc(Number(item[2]));
        return {
          id: newId(),
          date: `${dateText.slice(0, 4)}-${dateText.slice(4, 6)}-${dateText.slice(6, 8)}`,
          type: amount >= 0 ? "income" : "expense",
          name: readText(item[1]),
          category: "",
          amount
        };
      });

      const fixedCosts = packed[3].map(item => {
        if (!Array.isArray(item) || item.length < 3) throw new Error("invalid fixed cost");
        return {
          id: newId(),
          category: readText(item[0]),
          name: readText(item[1]),
          amount: Math.trunc(Number(item[2]))
        };
      });

      const fixedCategories = packed[4].map(index => readText(index));

      return normalizeData({
        currentBalance: Math.trunc(Number(packed[0])),
        fixedCategories,
        fixedCosts,
        transactions
      });
    }

    async function compressText(text) {
      const stream = new Blob([text]).stream().pipeThrough(new CompressionStream("deflate"));
      const buffer = await new Response(stream).arrayBuffer();
      return new Uint8Array(buffer);
    }

    async function decompressText(bytes) {
      const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream("deflate"));
      const buffer = await new Response(stream).arrayBuffer();
      return new TextDecoder().decode(buffer);
    }

    function bytesToBase64Url(bytes) {
      const chunks = [];
      const chunkSize = 0x8000;
      for (let index = 0; index < bytes.length; index += chunkSize) {
        chunks.push(String.fromCharCode(...bytes.subarray(index, index + chunkSize)));
      }
      return btoa(chunks.join("")).replaceAll("+", "-").replaceAll("/", "_").replaceAll("=", "");
    }

    function base64UrlToBytes(text) {
      const base64 = text.replaceAll("-", "+").replaceAll("_", "/")
        + "=".repeat((4 - text.length % 4) % 4);
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    async function copyText(text) {
      if (!navigator.clipboard || !window.isSecureContext) return false;
      try {
        await navigator.clipboard.writeText(text);
        return true;
      } catch {
        return false;
      }
    }

    function openModal(title, bodyHtml, placement = "center") {
      state.previousFocus = document.activeElement instanceof HTMLElement ? document.activeElement : null;
      elements.modalTitle.textContent = title;
      elements.modalBody.innerHTML = bodyHtml;
      elements.modalBackdrop.classList.remove("tone-income", "tone-expense");

    function closeModal({ restoreFocus = true } = {}) {
      elements.modalBackdrop.classList.remove("open", "tone-income", "tone-expense");
      elements.modalBody.innerHTML = "";
      if (restoreFocus && state.previousFocus && document.contains(state.previousFocus)) state.previousFocus.focus();
      state.previousFocus = null;
    }

    function handleDocumentKeydown(event) {
      if (!elements.modalBackdrop.classList.contains("open")) return;
      if (event.key === "Escape") {
        event.preventDefault();
        closeModal();
        return;
      }
      if (event.key === "Tab") trapModalFocus(event);
    }


    function focusableSelector() {
      return [
        "button:not([disabled])",
        "input:not([disabled])",
        "textarea:not([disabled])",
        "a[href]",
        "[tabindex]:not([tabindex='-1'])"
      ].join(",");
    }

    function trapModalFocus(event) {
      const focusable = [...elements.modalBackdrop.querySelectorAll(focusableSelector())]
        .filter(element => element.offsetParent !== null || element === document.activeElement);
      if (!focusable.length) {
        event.preventDefault();
        elements.modalBackdrop.focus();
        return;
      }

      const first = focusable[0];
      const last = focusable[focusable.length - 1];
      if (event.shiftKey && document.activeElement === first) {
        event.preventDefault();
        last.focus();
      } else if (!event.shiftKey && document.activeElement === last) {
        event.preventDefault();
        first.focus();
      }
    }

    function showConfirm({ title, message, leadMessage = "", confirmText = "削除", cancelText = "キャンセル", danger = false }) {
      return new Promise(resolve => {
        const leadHtml = leadMessage
          ? `<p class="confirm-lead">${escapeHtml(leadMessage).replaceAll("\n", "<br>")}</p>`
          : "";

            <button class="secondary-button" type="button" id="confirmCancelButton">${escapeHtml(cancelText)}</button>
          </div>
        `);

        document.getElementById("confirmOkButton").addEventListener("click", () => {
          closeModal({ restoreFocus: false });
          resolve(true);
        });
        document.getElementById("confirmCancelButton").addEventListener("click", () => {
          closeModal();
          resolve(false);
        });
      });
    }

    function showToast(message) {

      elements.toast.textContent = message;
      elements.toast.classList.add("open");
      state.toastTimer = setTimeout(() => elements.toast.classList.remove("open"), 2600);

    function setupEnterNavigation(inputIds) {
      const inputs = inputIds
        .map(id => document.getElementById(id))
        .filter(Boolean);

      inputs.forEach((input, index) => {
        input.addEventListener("keydown", event => {
          if (event.key !== "Enter") return;

          event.preventDefault();
          const nextInput = inputs[index + 1];

          if (nextInput) {
            nextInput.focus({ preventScroll: true });
            if (typeof nextInput.select === "function") nextInput.select();
            return;
          }

          input.blur();
        });
      });
    }

    function setupMoneyInput(inputId) {
      const input = document.getElementById(inputId);
      if (!input) return;

      input.addEventListener("focus", () => {
        const parsed = parseYenInput(input.value);
        input.value = parsed === null ? "" : String(parsed);
        input.select();
      });


      input.addEventListener("blur", () => {
        const parsed = parseYenInput(input.value);
        input.value = parsed === null ? "" : formatYenInput(parsed);
      });
    }

    function parseYenInput(value) {
      const digits = String(value || "").replace(/[^0-9]/g, "");
      if (!digits) return null;
      const number = Number(digits);
      return Number.isFinite(number) ? Math.trunc(number) : null;
    }

    function formatYenInput(value) {
      const number = Number(String(value ?? "").replace(/[^0-9]/g, ""));
      if (!Number.isFinite(number) || number <= 0) return "";
      return `¥ ${INTEGER_FORMATTER.format(Math.trunc(number))}`;
    }

    function readPositiveAmount(inputId) {
      const value = parseYenInput(document.getElementById(inputId).value);
      if (!Number.isFinite(value) || value <= 0) {
        showToast("金額を入力してください。");
        return null;
      }
      return Math.trunc(value);
    }

    function formatYen(value) {
      return YEN_FORMATTER.format(value);
    }

    function formatSignedYen(value) {
      const sign = value > 0 ? "+" : value < 0 ? "-" : "";
      return `${sign}${formatYen(Math.abs(value))}`;
    }

    function formatMonthDay(dateText) {
      const [, month, day] = dateText.split("-").map(Number);
      return `${month}/${day}`;
    }

    function todayAsInputValue() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function uniqueStrings(values) {
      return [...new Set(values.map(value => String(value || "").trim()).filter(Boolean))];
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function preventSiteZoom() {
      document.addEventListener("gesturestart", event => event.preventDefault(), { passive: false });
      document.addEventListener("gesturechange", event => event.preventDefault(), { passive: false });
      document.addEventListener("gestureend", event => event.preventDefault(), { passive: false });

      let lastTouchEnd = 0;
      document.addEventListener("touchend", event => {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) {
          event.preventDefault();
        }
        lastTouchEnd = now;
      }, { passive: false });
    }

    preventSiteZoom();
  </script>
</body>
</html>
